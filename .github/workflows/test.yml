name: 测试工作流

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  # 单元测试和集成测试
  unit-tests:
    name: 单元测试和集成测试
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行类型检查
        run: npm run type-check || npx vue-tsc --noEmit

      - name: 运行单元测试
        run: npm run test:run -- --coverage

      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

      - name: 存储覆盖率报告
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report-${{ matrix.node-version }}
          path: coverage/

  # E2E 测试
  e2e-tests:
    name: E2E 测试
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: 运行 E2E 测试
        run: npm run test:e2e -- --project=${{ matrix.browser }}

      - name: 存储测试报告
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

      - name: 存储测试结果
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

  # 构建测试
  build-test:
    name: 构建测试
    runs-on: ubuntu-latest

    needs: [unit-tests, e2e-tests]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建项目
        run: npm run build

      - name: 存储构建产物
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/

  # 性能测试
  performance-test:
    name: 性能测试
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行性能测试
        run: npm run test:performance || echo "性能测试脚本不存在"

  # 代码质量检查
  code-quality:
    name: 代码质量检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行 ESLint
        run: npm run lint || echo "ESLint 未配置"

      - name: 运行 Prettier 检查
        run: npm run format:check || echo "Prettier 未配置"

  # 测试汇总
  test-summary:
    name: 测试汇总
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests, build-test]
    if: always()

    steps:
      - name: 检查所有任务状态
        run: |
          if [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.e2e-tests.result }}" != "success" ] || \
             [ "${{ needs.build-test.result }}" != "success" ]; then
            echo "❌ 部分测试失败"
            exit 1
          else
            echo "✅ 所有测试通过"
          fi
